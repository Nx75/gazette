<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Gazette | Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/journal.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="../assets/img/gazatte.png" alt="Gazette Logo">
        </div>
        <div class="nav-links">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="journal.html">Journal</a></li>
                <li><a href="#">Vision</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </div>
    </div>
    <main>
        <h1 class="journal_title">My Gazette</h1>
        <div class="parent-container">
            <div class="journal-app">
                <label for="title">Title</label>
                <input type="text" id="title" autocomplete="off">
                <label for="description">Description</label>
                <textarea name="description" id="description"></textarea>
                <div class="toolbar">
                    <button data-cmd="bold" title="Bold">B</button>
                    <button data-cmd="italic" title="Italic">I</button>
                    <button data-cmd="underline" title="Underline">U</button>
                    <button data-cmd="underline" title="Underline"><s>S</s></button>
                </div>
                <button id="save">Save Journal</button>
                <div id="save-message" class="save-feedback"></div>
            </div>
        </div>
    </main>

</body>

</html>
