<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Page Not Found | My Gazette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/ERROR404.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <img src="../assets/img/gazatte.png" alt="Gazette Logo">
        </div>
        <div class="nav-links">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="journal.html">Journal</a></li>
                <li><a href="#">Vision</a></li>
                <li><a href="#">About Us</a></li>
            </ul>
        </div>
    </div>

    <main>
        <div class="error-container">
            <div class="error-content">
                <div class="error-code">
                    <span class="digit">4</span>
                    <span class="zero">0</span>
                    <span class="digit">4</span>
                </div>
                
                <div class="error-divider"></div>
                
                <h1 class="error-title">Page Not Found</h1>
                
                <p class="error-message">
                    The page you are looking for does not exist or has been moved.<br>
                    This feature is currently under development.
                </p>
                
                <div class="error-actions">
                    <a href="../index.html" class="action-btn primary">Back to Home</a>
                    <a href="journal.html" class="action-btn secondary">Go to Journal</a>
                </div>
                
                <div class="error-footer">
                    <p>Error 404 | Page Not Found</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
